name: Node.js Package

on:
  push:
    branches:
      - main

# 1. 必须声明此权限，允许向 npm 申请 OIDC 临时证书
permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          # 2. 注意：这里去掉了 registry-url
          
      # 3. 运行发布，去掉了 env: NODE_AUTH_TOKEN
      # --provenance 参数是 npm 官方推荐的，用于生成安全构建来源证明
      - run: npm publish --provenance
